version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: picture_publishing_db
    environment:
      POSTGRES_DB: picture_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - picture_network

  redis-cache:
    image: redis:7-alpine
    container_name: picture_publishing_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - picture_network

volumes:
  postgres_data:
  redis_data:

networks:
  picture_network:
    driver: bridge